<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학생 AI 도구</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>대학생 AI 도구</h1>
            <p>스마트한 대학 생활을 위한 최고의 AI 도구 모음</p>
        </div>
    </header>

    <main class="container">
        <!-- Level 1 Navigation -->
        <nav id="level1" class="nav-group">
            <button class="nav-btn active" data-id="free">무료</button>
            <button class="nav-btn" data-id="paid">유료</button>
        </nav>

        <!-- Level 2 & 3 Content Container -->
        <section id="categories-container" class="categories-container">
            <!-- Will be populated by JS -->
        </section>

        <!-- Detail View Container -->
        <section id="detail-view" class="detail-view hidden">
            <button id="back-btn" class="back-btn">← 뒤로 가기</button>
            <div id="detail-content"></div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 대학생 AI 도구. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
